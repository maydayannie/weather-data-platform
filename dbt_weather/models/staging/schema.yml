version: 2

sources:
  - name: src_weather
    description: "Raw data fetched directly from OpenWeather API"
    database: local_weather
    schema: main
    tables:
      - name: raw_weather_data
        description: "Raw real-time weather data fact table"
      - name: raw_pollution_data
        description: "Raw real-time air pollution data fact table"

models:
  - name: stg_weather
    description: "Staging table for weather monitoring data with incremental cleaning and unit conversion"
    columns:
      - name: city
        description: "Name of the observed city"
        tests:
          - not_null       # Core Test 1: City name must not be null

      - name: observation_time
        description: "Standard observation time for weather data"
        tests:
          - not_null       # Core Test 2: Observation time must not be null

      - name: temperature_celsius
        description: "Converted temperature in Celsius"
        tests:
          - not_null       # Core Test 3: Temperature must not be null
          - dbt_utils.accepted_range:
                 arguments:
                   min_value: -30
                   max_value: 32

          